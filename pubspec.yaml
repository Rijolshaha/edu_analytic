name: learning_analytics
description: Learning Analytics va ML asosida o'quvchilarning o'zlashtirishini prognozlash tizimi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Charts
  fl_chart: ^0.68.0

  # Storage
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.5
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  retrofit_generator: ^9.7.0
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/